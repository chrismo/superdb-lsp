name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-lsp:
    name: Test LSP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lsp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: lsp/go.sum

      - name: Clone brimdata/super dependency
        run: make deps
        working-directory: .

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lsp/coverage.out
          flags: lsp
        continue-on-error: true

  lint-lsp:
    name: Lint LSP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lsp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: lsp/go.sum

      - name: Clone brimdata/super dependency
        run: make deps
        working-directory: .

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: lsp

  validate-textmate:
    name: Validate TextMate Grammars
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g vscode-tmgrammar-test

      - name: Validate SPQ grammar JSON
        run: |
          # Validate JSON syntax
          cat supersql/spq.tmbundle/Syntaxes/spq.tmLanguage.json | python3 -m json.tool > /dev/null
          echo "SPQ grammar JSON is valid"
